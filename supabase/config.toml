# Forzza — Supabase config local
# Para ejecutar: supabase start (requiere Docker)

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.seed]
enabled = true
sql_paths = [
  "./seed/seed.sql",
  "./seed/exercises.sql",
  "./seed/exercises_descriptions_es.sql",
  "./seed/smoke-flow.sql"
]

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["https://127.0.0.1:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
minimum_password_length = 8
password_requirements = ""

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[auth.sms]
enable_signup = false
enable_confirmations = false

# Webhooks de pasarelas de pago: se autentican por firma HMAC dentro de la
# función (no por JWT). Sin esto, Kong rechaza con 401 "Missing authorization
# header" y el webhook nunca llega. Aplica en local y en deploy.
[functions.mp-webhook]
verify_jwt = false

[functions.mp-assignment-webhook]
verify_jwt = false
