appId: com.forzza.app
# Preconditions:
# - Run `supabase db reset` from the repo root so smoke-flow.sql is loaded.
# - Start Metro with `pnpm --filter mobile dev -- --host localhost --dev-client`.
# - Run `adb reverse tcp:8081 tcp:8081` and `adb reverse tcp:54321 tcp:54321`.
#   The dev-client link below uses 127.0.0.1 because adb reverse maps it from
#   the emulator back to the host Metro server.
---
- launchApp:
    clearState: true
- openLink: "forzza://expo-development-client/?url=http%3A%2F%2F127.0.0.1%3A8081"
- extendedWaitUntil:
    visible:
      id: "email-input"
    timeout: 60000
- assertVisible:
    id: "email-input"
- tapOn:
    id: "email-input"
- inputText: "alumno.smoke@forzza.app"
- tapOn:
    id: "password-input"
- inputText: "ForzzaSmoke123!"
- tapOn:
    id: "login-submit"
    waitToSettleTimeoutMs: 500
- assertVisible:
    id: "today-routine-card"
- tapOn:
    id: "today-routine-card"
    waitToSettleTimeoutMs: 500
- assertVisible:
    id: "start-workout-button"
- tapOn:
    id: "routine-exercise-0"
    waitToSettleTimeoutMs: 500
- assertVisible:
    id: "exercise-preview-sheet"
- back
- waitForAnimationToEnd:
    timeout: 5000
- tapOn: "‹ Back"
- assertVisible:
    id: "today-routine-card"
- tapOn:
    id: "today-routine-card"
    waitToSettleTimeoutMs: 500
- assertVisible:
    id: "start-workout-button"
- tapOn:
    id: "start-workout-button"
    waitToSettleTimeoutMs: 1000
    retryTapIfNoChange: true
- evalScript: ${ const startedAt = Date.now(); while (Date.now() - startedAt < 1000) {} }
- tapOn:
    id: "start-workout-button"
    optional: true
    waitToSettleTimeoutMs: 1000
- extendedWaitUntil:
    visible:
      id: "reps-input"
    timeout: 20000
- assertVisible:
    id: "reps-input"
- tapOn:
    id: "reps-input"
- inputText: "10"
- tapOn:
    id: "weight-input"
- inputText: "40"
- hideKeyboard
- tapOn:
    id: "log-set-button"
    waitToSettleTimeoutMs: 500
- assertVisible:
    id: "skip-rest-button"
- tapOn:
    id: "skip-rest-button"
- swipe:
    direction: UP
- tapOn:
    id: "next-exercise-button"
    waitToSettleTimeoutMs: 500
- assertVisible:
    id: "reps-input"
- tapOn:
    id: "reps-input"
- inputText: "12"
- hideKeyboard
- tapOn:
    id: "log-set-button"
    waitToSettleTimeoutMs: 500
- assertVisible:
    id: "skip-rest-button"
- tapOn:
    id: "skip-rest-button"
- tapOn:
    id: "finish-workout-button"
    waitToSettleTimeoutMs: 500
- tapOn: "FINISH"
- assertVisible:
    id: "today-routine-card"
